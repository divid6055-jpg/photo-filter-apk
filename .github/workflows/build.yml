name: Build APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.5'

      - name: Grant execute permission for gradlew (if exists)
        run: chmod +x ./gradlew || true

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: List built APKs
        run: |
          echo "Built APKs:"
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: photo-filter-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: photo-filter-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.5'

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Generate version tag
        id: version
        run: |
          echo "tag=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "name=Release $(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: app/build/outputs/apk/release/*.apk
          body: |
            # PhotoFilter Pro - ${{ steps.version.outputs.name }}

            تطبيق تعديل الصور الاحترافي

            ## المميزات
            - 18+ فلتر احترافي (Vintage, Cinematic, Lomo وغيرها)
            - 10 أدوات تعديل (سطوع، تباين، تشبع، حدة، إضاءات، ظلال، إلخ)
            - قص بنسب عرض متعددة (1:1, 4:3, 16:9, إلخ)
            - تدوير وقلب الصور
            - معاينة حية قبل/بعد
            - حفظ ومشاركة مباشرة

            ## التثبيت
            1. نزّل ملف APK
            2. فعّل "تثبيت تطبيقات من مصادر غير معروفة" في إعدادات أندرويد
            3. افتح ملف APK واتبع التعليمات
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
